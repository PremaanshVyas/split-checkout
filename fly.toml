# Fly.io config. Deploy with `fly deploy` after `fly launch --no-deploy`.
# Secrets (never in this file): fly secrets set AIRWALLEX_CLIENT_ID=... AIRWALLEX_API_KEY=...
app = "split-checkout-demo"
primary_region = "syd"

[build]

[env]
  PORT = "3001"
  AIRWALLEX_BASE_URL = "https://api-demo.airwallex.com"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
